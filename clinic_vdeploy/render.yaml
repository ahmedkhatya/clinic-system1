services:
  - type: web
    name: clinic-system
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: clinic-db
          property: connectionString

databases:
  - name: clinic-db
    plan: free
