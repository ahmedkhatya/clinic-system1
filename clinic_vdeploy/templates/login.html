<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - عيادة د. أحمد خالد</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f4d82 0%, #1a6eb5 50%, #2196f3 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 24px;
            padding: 3rem 2.5rem;
            width: 100%; max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,.25);
        }
        .clinic-logo {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #1a6eb5, #2196f3);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.25rem;
            box-shadow: 0 8px 20px rgba(26,110,181,.35);
        }
        .clinic-logo i { font-size: 2.5rem; color: #fff; }
        h2 { font-weight: 800; color: #1a2a40; font-size: 1.6rem; }
        .sub { color: #888; font-size: .9rem; }
        .form-control {
            border-radius: 12px; border: 1.5px solid #d1d9e0;
            padding: .65rem 1rem; font-size: .95rem;
        }
        .form-control:focus { border-color: #1a6eb5; box-shadow: 0 0 0 3px rgba(26,110,181,.15); }
        .input-group-text { border-radius: 12px 0 0 12px; background: #f0f4f8; border: 1.5px solid #d1d9e0; }
        .btn-login {
            background: linear-gradient(135deg, #1a6eb5, #2196f3);
            border: none; border-radius: 12px;
            padding: .75rem; font-size: 1rem; font-weight: 700;
            color: #fff; width: 100%;
            transition: transform .15s, box-shadow .15s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(26,110,181,.4); color: #fff; }
        label { font-weight: 600; color: #444; font-size: .88rem; }
        .alert { border-radius: 12px; border: none; font-size: .9rem; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <div class="clinic-logo">
            <i class="bi bi-hospital-fill"></i>
        </div>
        <h2>عيادة د. أحمد خالد</h2>
        <p class="sub mb-4">نظام إدارة العيادة الذكي</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
          <div class="alert alert-{{ category }} text-start">
            <i class="bi bi-exclamation-circle me-1"></i> {{ message }}
          </div>
          {% endfor %}
        {% endwith %}

        <form method="POST" class="text-start">
            <div class="mb-3">
                <label for="username">اسم المستخدم</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-fill text-primary"></i></span>
                    <input type="text" name="username" id="username" class="form-control" placeholder="أدخل اسم المستخدم" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label for="password">كلمة المرور</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill text-primary"></i></span>
                    <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i> دخول
            </button>
        </form>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
